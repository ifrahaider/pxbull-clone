<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PXBULL Academy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- GLOBAL APPLICATION NAVIGATION -->
    <nav class="app-navbar">
        <div class="nav-container">
            <div class="brand-logo">
                <div class="logo-box"><span>PX</span></div>
                <span class="brand-text">BULL</span>
            </div>
            
            <div class="nav-links">
                <a href="#" class="nav-item">Home</a>
                <div class="nav-dropdown">
                    <button class="nav-item drop-btn">
                        Academy 
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                    </button>
                </div>
                <a href="#" class="nav-item">Solutions</a>
                <a href="#" class="nav-item">Case Studies</a>
                <a href="#" class="nav-item">Contact</a>
            </div>

            <div class="nav-actions">
                <button class="btn-portal">Client Portal</button>
                <button class="nav-btn-cta">Start Consultation</button>
            </div>
        </div>
    </nav>

    <main>
    <!-- HERO BANNER SECTION -->
        <section class="hero-section">
            <div class="hero-container">
                <div class="hero-content">
                    <div class="hero-badge">
                        <span class="badge-dot-wrapper">
                            <span class="badge-dot-pulse"></span>
                            <span class="badge-dot"></span>
                        </span>
                        Accelerate Your Tech Potential
                    </div>
                    
                    <h1 class="hero-headline">
                        Learn. Build. <br>
                        <span class="text-brand">Grow Your Career</span>
                    </h1>
                    
                    <p class="hero-subheadline">
                        Gain industry-ready skills with project-based learning and expert mentorship at PXBULL Academy.
                    </p>
                    
                    <div class="hero-actions">
                        <button class="btn-primary">
                            Explore Courses
                            <svg class="btn-arrow" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                        </button>
                        <button class="btn-secondary">Book Consultation</button>
                    </div>
                <div class="student-stats">
                        <div class="avatar-group">
                            <img src="https://i.pravatar.cc/100?img=11" alt="avatar">
                            <img src="https://i.pravatar.cc/100?img=12" alt="avatar">
                            <img src="https://i.pravatar.cc/100?img=13" alt="avatar">
                            <img src="https://i.pravatar.cc/100?img=14" alt="avatar">
                        </div>
                        <div class="stats-text">
                            <span class="stats-count">2,500+</span> Students Graduated
                        </div>
                    </div>
                </div>
                 <div class="hero-media">
                    <div class="glow-bg top-glow"></div>
                    <div class="glow-bg bottom-glow"></div>
                    <div class="image-wrapper">
                        <img src="https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?auto=format&fit=crop&q=80&w=800" alt="Tech Workspace" class="main-hero-img">
                        <div class="floating-card-badge">
                            <div class="badge-content-top">
                                <div class="check-icon-box">
                                    <svg class="check-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
                                </div>
                                <div class="card-info">
                                    <div class="card-title">Job Readiness</div>
                                    <div class="card-subtitle">Placement Support</div>
                                </div>
                            </div>
                            <div class="card-progress-track">
                                <div class="card-progress-bar"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
